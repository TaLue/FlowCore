services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=flowcore;Username=postgres;Password=postgres
      - Jwt__Key=CHANGE_THIS_TO_A_STRONG_SECRET_KEY_AT_LEAST_32_CHARS
      - Jwt__Issuer=FlowCore
      - Jwt__ExpiryMinutes=60
      - Cors__AllowedOrigins__0=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
